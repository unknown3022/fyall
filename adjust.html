<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adjust S2S Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070f;
    --surface: #0e0e1a;
    --surface2: #12121f;
    --border: #1a1a2e;
    --border2: #242438;
    --accent: #0ea5e9;
    --accent-glow: rgba(14,165,233,0.25);
    --accent-soft: rgba(14,165,233,0.1);
    --text: #f0f0fa;
    --text2: #a0a0c0;
    --muted: #4a4a6a;
    --danger: #f43f5e;
    --warn: #f59e0b;
    --success: #10b981;
    --card: #0c0c18;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem 2.5rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(14,165,233,0.07), transparent),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(6,182,212,0.06), transparent);
  }

  header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 0;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #0ea5e9, #06b6d4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(14,165,233,0.3), 0 2px 8px rgba(0,0,0,0.4);
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .logo-mark::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); }
  .logo-dot { width:8px;height:8px;background:white;border-radius:50%;box-shadow:0 0 6px rgba(255,255,255,0.8); }
  h1 { font-size:1rem;font-weight:700;letter-spacing:0.04em;color:var(--text);text-transform:uppercase; }
  h1 span { color: var(--accent); }
  .tag {
    margin-left: auto;
    background: var(--accent-soft);
    border: 1px solid rgba(14,165,233,0.3);
    color: var(--accent);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; padding: 0.3rem 0.75rem;
    border-radius: 20px; letter-spacing: 0.12em; font-weight: 600;
  }
  .back-btn {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    border-radius: 8px; padding: 0.35rem 0.75rem; font-size: 0.75rem;
    cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    letter-spacing: 0.05em; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--text); }

  .layout {
    display: grid; grid-template-columns: 1fr 390px;
    gap: 1.25rem; max-width: 1120px; margin-top: 1.75rem;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.6rem;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.02);
  }
  .card-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase;
    margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .card-label::before { content:''; display:inline-block; width:16px; height:1px; background:var(--border2); }
  .field { margin-bottom: 1.1rem; }
  label {
    display: block; font-size: 0.7rem; font-weight: 600; color: var(--text2);
    letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.45rem;
  }
  input[type="text"], input[type="number"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; color: var(--text); font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem; padding: 0.7rem 1rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; appearance: none;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .checkbox-row { display: flex; gap: 1.5rem; margin-top: 0.25rem; }
  .checkbox-label {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.85rem; color: var(--text2); cursor: pointer;
    text-transform: none; letter-spacing: 0; font-weight: 600;
  }
  input[type="checkbox"] { width: auto; accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }

  .timer-inputs { display: flex; gap: 0.5rem; align-items: flex-end; }
  .timer-unit { flex: 1; text-align: center; }
  .timer-unit label { text-align: center; }
  .timer-unit input { text-align: center; font-size: 1.5rem; font-weight: 700; padding: 0.65rem; }
  .timer-colon { font-size: 1.8rem; color: var(--border2); padding-bottom: 0.5rem; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }

  .btn-primary {
    width: 100%; padding: 0.9rem;
    background: linear-gradient(135deg, #0ea5e9, #06b6d4);
    color: white; border: none; border-radius: 12px;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    transition: all 0.2s; margin-top: 1.25rem;
    box-shadow: 0 4px 16px rgba(14,165,233,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(14,165,233,0.45); }
  .btn-secondary {
    width: 100%; padding: 0.65rem; background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif; font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .right-panel { display: flex; flex-direction: column; gap: 1.25rem; }
  .log-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem; height: 180px; overflow-y: auto;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; line-height: 1.6;
    white-space: pre-wrap;
  }
  .empty-queue { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.8rem; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; }

  .job-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.8rem 1rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; margin-bottom: 0.5rem;
    position: relative; overflow: hidden;
  }
  .job-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); }
  .job-item.done::before { background: var(--success); }
  .job-info { flex:1; min-width:0; }
  .job-id { font-size:0.75rem; font-weight:700; color:var(--text); }
  .job-detail { font-family:'IBM Plex Mono',monospace; font-size:0.68rem; color:var(--muted); margin-top:0.1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-status { font-size:0.6rem; letter-spacing:0.08em; padding:0.2rem 0.55rem; border-radius:20px; font-weight:700; text-transform:uppercase; }
  .job-status.pending { background:rgba(14,165,233,0.12); color:var(--accent); }
  .job-status.done { background:rgba(16,185,129,0.12); color:var(--success); }
  .job-cancel { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:0.25rem 0.35rem; border-radius:6px; transition:all 0.15s; }
  .job-cancel:hover { color:var(--danger); background:rgba(244,63,94,0.1); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  <div class="logo-mark"><div class="logo-dot"></div></div>
  <h1>Adjust <span>S2S</span> Manual</h1>
  <span class="tag">S2S Event Fire</span>
</header>

<div class="layout">
  <div class="card">
    <div class="card-label">// Event Configuration</div>

    <div class="field">
      <label>App Token</label>
      <input type="text" id="app_token" placeholder="App Token">
    </div>
    <div class="field">
      <label>Event Token</label>
      <input type="text" id="event_token" placeholder="Event Token">
    </div>
    <div class="field">
      <label>Device ID</label>
      <input type="text" id="device_id" placeholder="Device ID">
    </div>
    <div class="field">
      <div class="checkbox-row">
        <label class="checkbox-label">
          <input type="checkbox" id="ios" checked> iOS
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="s2s"> s2s
        </label>
      </div>
    </div>

    <button class="btn-primary" onclick="creditNow()">🔥 Credit Now</button>

    <div class="divider"></div>
    <div class="card-label">// Schedule</div>

    <div class="timer-inputs">
      <div class="timer-unit">
        <label>Hours</label>
        <input type="number" id="hours" min="0" value="0">
      </div>
      <div class="timer-colon">:</div>
      <div class="timer-unit">
        <label>Minutes</label>
        <input type="number" id="minutes" min="0" max="59" value="0">
      </div>
      <div class="timer-colon">:</div>
      <div class="timer-unit">
        <label>Seconds</label>
        <input type="number" id="seconds" min="0" max="59" value="0">
      </div>
    </div>
    <button class="btn-secondary" onclick="schedule()">⏱ Schedule</button>
  </div>

  <div class="right-panel">
    <div class="card" style="flex:1">
      <div class="card-label">// Jobs</div>
      <div id="jobs"><div class="empty-queue">no jobs</div></div>
    </div>
    <div class="card">
      <div class="card-label">// Logs</div>
      <div class="log-box" id="logs"></div>
      <button class="btn-secondary" onclick="document.getElementById('logs').textContent=''">clear log</button>
    </div>
  </div>
</div>

<script>
const loggedJobs = new Set();

function getData() {
  return {
    app_token: app_token.value,
    event_token: event_token.value,
    device_id: device_id.value,
    is_ios: ios.checked,
    use_s2s: s2s.checked
  };
}

function addLog(data) {
  const logBox = document.getElementById('logs');
  logBox.textContent = JSON.stringify(data, null, 2) + '\n\n' + logBox.textContent;
}

async function creditNow() {
  const res = await fetch('/credit-now', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(getData())
  });
  const data = await res.json();
  console.log(data);
  addLog(data);
}

async function schedule() {
  await fetch('/schedule', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ...getData(),
      hours: hours.value || 0,
      minutes: minutes.value || 0,
      seconds: seconds.value || 0
    })
  });
}

async function cancelJob(id) {
  await fetch('/cancel/' + id, { method: 'POST' });
}

function format(sec) {
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = sec%60;
  return h+'h '+m+'m '+s+'s';
}

async function loadJobs() {
  const res = await fetch('/jobs');
  const jobs = await res.json();
  const container = document.getElementById('jobs');
  if (!jobs.length) { container.innerHTML = '<div class="empty-queue">no jobs</div>'; return; }
  container.innerHTML = '';
  jobs.forEach(j => {
    const div = document.createElement('div');
    div.className = 'job-item ' + (j.done ? 'done' : 'pending');
    div.innerHTML = `
      <div class="job-info">
        <div class="job-id">Job #${j.id}</div>
        <div class="job-detail">${j.done ? JSON.stringify(j.result) : format(j.remaining)}</div>
      </div>
      <span class="job-status ${j.done ? 'done' : 'pending'}">${j.done ? 'done' : 'pending'}</span>
      ${!j.done ? `<button class="job-cancel" onclick="cancelJob(${j.id})">×</button>` : ''}
    `;
    container.appendChild(div);

    if (j.done && j.result && !loggedJobs.has(j.id)) {
      addLog(j.result);
      loggedJobs.add(j.id);
    }
  });
}

setInterval(loadJobs, 1000);
</script>
</body>
</html>
